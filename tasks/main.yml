---
- name: Install sync-haproxy-certs script
  ansible.builtin.copy:
    src: usr/local/bin/sync-haproxy-certs.sh
    dest: /usr/local/bin/sync-haproxy-certs.sh
    mode: "0755"
    owner: root
    group: root

- name: Install sync-certificates systemd units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  loop:
    - etc/systemd/system/sync-certificates.service
    - etc/systemd/system/sync-certificates.timer
